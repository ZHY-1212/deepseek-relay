<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DS Relay — 多模型 AI API 平台</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%234f46e5'/><path d='M16 6C11 6 7 10 6 14 5 16 5 19 7 21 9 23 12 23 15 22 18 21 21 19 23 16 25 13 24 10 22 8 20 6 17 6 16 6Z' fill='%23fff' opacity='.3'/><circle cx='12' cy='13' r='2' fill='%23fff'/><path d='M17 12c1.5-1.5 5-3 7-3' stroke='%23fff' stroke-width='2.5' stroke-linecap='round'/></svg>">
    <style>{{ inline_css | safe }}</style>
</head>
<body>
    <header id="topnav" style="display:none">
        <div class="nav-inner">
            <a href="#/models" class="logo"><span class="logo-dot"></span>DS Relay</a>
            <nav class="nav-links">
                <a href="#/models" class="nav-link">模型广场</a>
                <a href="#/models-intro" class="nav-link">模型介绍</a>
                <a href="#/leaderboard" class="nav-link">平台数据</a>
                <a href="#/docgen" class="nav-link">文档生成</a>
                <a href="#/chat" class="nav-link">体验中心</a>
                <a href="#/dashboard" class="nav-link">控制台</a>
                <a href="#/recharge" class="nav-link">余额充值</a>
                <a href="#/pricing" class="nav-link">计费规则</a>
                <a href="#/docs" class="nav-link">API 文档</a>
                <a href="#/admin" class="nav-link admin-only" style="display:none">管理后台 <span id="admin-badge" style="display:none;background:var(--red);color:#fff;border-radius:10px;padding:0 6px;font-size:10px;margin-left:2px">0</span></a>
            </nav>
            <div class="nav-actions">
                <button id="btn-theme" title="切换主题">◐</button>
                <a href="#/profile" class="nav-link" style="text-decoration:none;font-size:13px;color:var(--text-secondary);padding:5px 12px">个人中心</a>
                <button class="btn-logout" id="btn-logout">退出</button>
            </div>
        </div>
    </header>

    <main id="app">
        <div style="display:flex;align-items:center;justify-content:center;min-height:80vh">
            <div style="text-align:center">
                <div style="width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px"></div>
                <div style="font-size:14px;color:var(--text-secondary)">DS Relay 加载中...</div>
            </div>
        </div>
    </main>

    <script defer src="/static/js/bundle.js?v={{ js_version }}"></script>
</body>
</html>
