# DeepSeek Relay - 生产部署
# 1. 在 .env 中设置 DOMAIN=你的域名
# 2. docker compose up -d
# 3. docker compose run --rm certbot certonly --webroot -w /var/www/certbot -d ${DOMAIN}
# 4. docker compose exec nginx nginx -s reload

services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - ./app/static:/app/static:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - app
    # nginx:alpine 官方镜像自动用 envsubst 处理 /etc/nginx/templates/*.template
    command: /bin/sh -c "envsubst '$${DOMAIN}' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"

  certbot:
    image: certbot/certbot
    profiles: ["ssl"]
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: ""

volumes:
  certbot_www:
  certbot_certs:
